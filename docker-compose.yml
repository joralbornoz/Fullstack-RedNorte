services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-rednorte
    restart: always
    environment:
      MYSQL_DATABASE: rednorte_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user_rednorte
      MYSQL_PASSWORD: admin123
    ports:
      - "3307:3306" 
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: