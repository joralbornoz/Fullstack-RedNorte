version: '3.8'

services:
  # -----------------------------------------------------
  # 1. BASE DE DATOS DE USUARIOS (Puerto 3306)
  # -----------------------------------------------------
  db-usuarios:
    image: mysql:8.0
    container_name: rednorte-db-usuarios
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rednorte_usuarios
      MYSQL_USER: user_usuarios
      MYSQL_PASSWORD: devpassword
    ports:
      - "3306:3306"
    volumes:
      - db-usuarios-data:/var/lib/mysql

  # -----------------------------------------------------
  # 2. BASE DE DATOS DE LISTA DE ESPERA (Puerto 3307)
  # -----------------------------------------------------
  db-lista-espera:
    image: mysql:8.0
    container_name: rednorte-db-lista-espera
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: db_lista_espera
      MYSQL_USER: user_lista_espera
      MYSQL_PASSWORD: devpassword
    ports:
      - "3307:3306"
    volumes:
      - db-lista-espera-data:/var/lib/mysql

  # -----------------------------------------------------
  # 3. ZOOKEEPER (Coordinador de Kafka)
  # -----------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: rednorte-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # -----------------------------------------------------
  # 4. KAFKA BROKER (Puerto 9092)
  # -----------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0  # Usar una versión estable conocida
    container_name: rednorte-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  # -----------------------------------------------------
  # 5. BASE DE DATOS DE REASIGNACION (Puerto 3308)
  # -----------------------------------------------------
  db-reasignacion:
    image: mysql:8.0
    container_name: rednorte-db-reasignacion
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: db_reasignacion
      MYSQL_USER: user_reasignacion
      MYSQL_PASSWORD: devpassword
    ports:
      - "3308:3306" # Exponemos en el 3308
    volumes:
      - db-reasignacion-data:/var/lib/mysql

# No olvides agregar el volumen al final del archivo
volumes:
  db-usuarios-data:
  db-lista-espera-data:
  db-reasignacion-data:
