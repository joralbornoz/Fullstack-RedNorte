spring:
  cloud:
    gateway:
      routes:
        - id: gateway-auth-route
          uri: http://localhost:8080
          predicates:
            - Path=/api/v1/auth/**

        - id: ms-usuarios-auth-route
          uri: http://localhost:8001
          predicates:
            - Path=/api/v1/usuarios/auth/**

        - id: ms-usuarios-private-route
          uri: http://localhost:8001
          predicates:
            - Path=/api/v1/usuarios/**

        - id: ms-bff-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/bff/**
services:
  usuarios:
    url: http://localhost:8001/api/v1